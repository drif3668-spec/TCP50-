<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Login — FUNX.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/free-account.css">
</head>
<body class="fa-page fa-admin-page">
  <div class="fa-bg" aria-hidden="true"></div>
  <main class="fa-admin-login-main">
    <form class="fa-admin-login-card" data-admin-login-form>
      <span>FUNX.AI ADMIN</span>
      <h1>تسجيل دخول لوحة الإدارة</h1>
      <p>أدخل Gmail وكلمة السر للوصول إلى لوحة الطلبات.</p>
      <label>Gmail
        <input name="email" type="email" autocomplete="username" required>
      </label>
      <label>كلمة السر
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">دخول لوحة الإدارة</button>
      <div class="fa-admin-login-hint">
        <strong>بيانات الدخول الحالية:</strong>
        <span>Gmail: funx.admin.427@gmail.com</span>
        <span>Password: FUNX-ADMIN</span>
      </div>
      <div class="fa-admin-entry" style="text-align:center;">
        <a href="funx-admin-login.html">🔄 الانتقال إلى لوحة الإدارة الجديدة</a>
      </div>
    </form>
  </main>
  <script src="js/free-account.js"></script>
  <script src="js/funx-store.js"></script>
</body>
</html>
