<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>تسجيل الدخول — لوحة الإدارة FUNX.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/funx-admin.css">
</head>
<body class="fa-admin-body">
  <div class="fa-bg" aria-hidden="true"></div>

  <main class="fa-admin-login-main">
    <form class="fa-admin-login-card" data-fa-admin-login-form>
      <span>FUNX.AI ADMIN</span>
      <h1>تسجيل الدخول</h1>
      <p>لوحة إدارة الطلبات والمنتجات</p>

      <div class="fa-admin-login-error" data-fa-login-error></div>

      <label>
        البريد الإلكتروني (Gmail)
        <input name="email" type="email" autocomplete="username" placeholder="admin@example.com" required>
      </label>

      <label>
        كلمة السر
        <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      </label>

      <button type="submit">دخول لوحة الإدارة</button>

      <div class="fa-admin-login-hint">
        <strong>بيانات الدخول:</strong>
        <span>Gmail: funx.admin.427@gmail.com</span>
        <span>Password: FUNX-ADMIN</span>
      </div>
    </form>
  </main>

  <script src="js/funx-store.js"></script>
</body>
</html>
