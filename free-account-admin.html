<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin — طلبات TCP50</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/free-account.css">
</head>
<body class="fa-page fa-admin-page">
  <div class="fa-bg" aria-hidden="true"></div>
  <main class="fa-admin-main">
    <section class="fa-admin-head">
      <span>ADMIN</span>
      <h1>لوحة إدارة طلبات TCP50</h1>
      <p>هذه الصفحة غير مرتبطة داخل الموقع. البيانات محفوظة محلياً في هذا المتصفح.</p>
      <button type="button" class="fa-admin-logout" data-admin-logout>تسجيل الخروج</button>
    </section>

    <section class="fa-admin-tabs">
      <button type="button" class="is-active" data-admin-filter="free">طلبات الحساب المجاني</button>
      <button type="button" data-admin-filter="paid">طلبات خدمة اجتياز الاختبار</button>
    </section>

    <section class="fa-admin-table-wrap">
      <table class="fa-admin-table">
        <thead>
          <tr>
            <th>الاسم</th>
            <th>البريد الإلكتروني</th>
            <th>رقم واتساب</th>
            <th>الدولة</th>
            <th>تاريخ الإرسال</th>
            <th>حالة الطلب</th>
            <th>حذف</th>
          </tr>
        </thead>
        <tbody id="adminOrdersBody"></tbody>
      </table>
      <div class="fa-admin-empty" id="adminEmpty">لا توجد طلبات حالياً.</div>
      <div class="fa-admin-entry">
        <a href="funx-admin.html">🔄 الانتقال إلى لوحة الإدارة الجديدة</a>
      </div>
    </section>
  </main>

  <script src="js/free-account.js"></script>
  <script src="js/funx-store.js"></script>
</body>
</html>
